name: Release Tag

on:
  workflow_call:
    inputs:
      target_branch:
        description: 'Branch base do PR (Destino)'
        required: false
        type: string
        default: 'master'
      source_branch:
        description: 'Branch de origem do PR'
        required: false
        type: string
        default: 'qa'

# É recomendado declarar as permissões no componente também
permissions:
  contents: write

jobs:
  create-release-tag:
    name: Criar tag de release
    runs-on: ubuntu-latest

    if: ${{ github.head_ref == inputs.source_branch && github.base_ref == inputs.target_branch }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Extrair versão do título do PR
        id: version
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          
          VERSION=$(echo "$TITLE" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')

          if [ -z "$VERSION" ]; then
            echo "Nenhuma versão encontrada no título do PR."
            echo "Use um título como: Release v1.2.0"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verificar se a tag já existe
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "A tag ${{ steps.version.outputs.version }} já existe."
            exit 1
          fi

      - name: Criar e publicar tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}